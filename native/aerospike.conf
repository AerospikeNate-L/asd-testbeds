# Local single-node development config

service {
	proto-fd-max 15000
	cluster-name local-dev
	feature-key-file /etc/aerospike/features.conf
}

logging {
	console {
		context any info
	}
	file /var/log/aerospike/aerospike.log {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
		mode mesh
		port 3002
		interval 150
		timeout 10
	}

	fabric {
		port 3001
	}
}

namespace test {
	replication-factor 1
	default-ttl 0
	nsup-period 120
	single-query-threads 1
	
	storage-engine memory {
		data-size 1G
	}
}
