services:
  aerospike-3:
    image: ${MIXED_FAIL_OPEN_OLD_IMAGE:-docker.qe.aerospike.com/test/aerospike-server:x86-amazonlinux-2023}
    build: null
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        mkdir -p /var/lib/aerospike /var/log/aerospike /var/run/aerospike
        /opt/aerospike/usr/udf/lua /opt/aerospike/sys/udf/lua
        /opt/aerospike/smd /opt/aerospike/data /opt/aerospike/xdr &&
        exec /usr/bin/asd --foreground --config-file /etc/aerospike/aerospike.conf
    healthcheck:
      test: ["CMD", "/bin/true"]
